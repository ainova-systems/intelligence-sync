name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          shellcheck --version
          # Skip the adapter template — `<name>` placeholders are parsed as
          # input redirection by bash/shellcheck.
          find intelligence/sync/scripts -name '*.sh' \
            -not -path '*/adapters/_template.sh' \
            -print0 | xargs -0 shellcheck --severity=warning

  repo-purity:
    name: repo-purity (no flat twin / zero duplication)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Repo must be pure-modular — no flat bridge
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          for p in intelligence/scripts intelligence/INIT.md; do
            if [ -e "$p" ]; then echo "DUPLICATION: $p must not exist"; fail=1; fi
          done
          if [ -n "$(find intelligence/skills -maxdepth 1 -name 'intelligence-*' 2>/dev/null)" ]; then
            echo "DUPLICATION: intelligence/skills/intelligence-* must live only in intelligence/sync/skills/"; fail=1
          fi
          test -f intelligence/sync/scripts/sync.sh
          test -f intelligence/sync/scripts/VERSION
          # Vendored docs must mirror the doc source exactly.
          diff -rq docs intelligence/sync/docs
          [ "$fail" -eq 0 ] && echo "OK: pure-modular, single source, no duplication"
          exit $fail

      - name: Example fixtures must be stamped at the engine VERSION
        shell: bash
        run: |
          set -euo pipefail
          # Examples are "ready-to-sync at the current engine" fixtures: the
          # smoke job copies the fresh engine alongside them and expects
          # IS_STATUS=ok. sync.sh fails closed when stamp < engine, so a bumped
          # VERSION with an un-bumped example silently turns smoke into a
          # confusing exit 6. Assert lockstep here for a precise early signal.
          V="$(tr -d ' \t\r\n' < intelligence/sync/scripts/VERSION)"
          fail=0
          for cf in examples/*/config.yaml; do
            stamp="$(awk -F'"' '/^sync_version:/ {print $2; exit}' "$cf")"
            if [ "$stamp" != "$V" ]; then
              echo "STAMP DRIFT: $cf has sync_version=\"$stamp\", expected \"$V\""; fail=1
            fi
          done
          [ "$fail" -eq 0 ] && echo "OK: all examples stamped at $V"
          exit $fail

  smoke:
    name: smoke (sync against examples)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        example: [go-api, dotnet-api-with-react-frontend, platform-with-submodules]
    steps:
      - uses: actions/checkout@v6
      - name: Stage example as project root (modular layout)
        shell: bash
        run: |
          set -euo pipefail
          PROJ=$RUNNER_TEMP/proj
          mkdir -p "$PROJ/intelligence"
          cp -r intelligence/sync "$PROJ/intelligence/sync"
          cp examples/${{ matrix.example }}/config.yaml "$PROJ/intelligence/config.yaml"

          mkdir -p "$PROJ/intelligence/rules" "$PROJ/intelligence/agents" "$PROJ/intelligence/skills"

          cat > "$PROJ/intelligence/rules/context.md" <<'EOF'
          # Always-on context

          Use this for project-wide standards.
          EOF

          cat > "$PROJ/intelligence/rules/backend.md" <<'EOF'
          ---
          paths:
            - "src/backend/**"
          description: "Backend rules: use feature folders"
          ---

          # Backend conventions

          Some scoped guidance.
          EOF

          cat > "$PROJ/intelligence/agents/backend-developer.md" <<'EOF'
          ---
          name: backend-developer
          description: "Implements backend features: APIs, services"
          tier: heavy
          access: full
          ---

          # Backend developer

          Builds new endpoints.
          EOF

          mkdir -p "$PROJ/intelligence/skills/backend-add-endpoint"
          cat > "$PROJ/intelligence/skills/backend-add-endpoint/SKILL.md" <<'EOF'
          ---
          name: backend-add-endpoint
          description: "Add an endpoint: handler + route + tests"
          ---

          # Add endpoint

          Steps to add a new endpoint.
          EOF

          git -C "$PROJ" init -q
          git -C "$PROJ" add -A
          git -C "$PROJ" -c user.email=ci@example.com -c user.name=ci commit -q -m init
          echo "PROJ=$PROJ" >> "$GITHUB_ENV"

      - name: Run sync
        shell: bash
        run: |
          cd "$PROJ"
          out=$(bash intelligence/sync/scripts/sync.sh)
          echo "$out"
          echo "$out" | grep -q 'IS_STATUS=ok' || { echo "missing IS_STATUS=ok"; exit 1; }

      - name: Verify AGENTS.md
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PROJ/AGENTS.md"
          grep -q "Use this for project-wide standards" "$PROJ/AGENTS.md"
          grep -q "backend-developer" "$PROJ/AGENTS.md"
          grep -q "backend-add-endpoint" "$PROJ/AGENTS.md"

      - name: Verify Claude / Cursor / Copilot / Codex outputs (if enabled)
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$PROJ/.claude" ]; then
            test -f "$PROJ/.claude/rules/context.md"
            test -f "$PROJ/.claude/rules/backend.md"
            test -f "$PROJ/.claude/agents/backend-developer.md"
            test -f "$PROJ/.claude/skills/backend-add-endpoint/SKILL.md"
          fi
          if [ -d "$PROJ/.cursor" ]; then
            ! test -e "$PROJ/.cursor/rules/context.mdc"
            test -f "$PROJ/.cursor/rules/backend.mdc"
            grep -q "globs:" "$PROJ/.cursor/rules/backend.mdc"
          fi
          if [ -d "$PROJ/.github/instructions" ]; then
            ! test -e "$PROJ/.github/copilot-instructions.md"
            test -f "$PROJ/.github/instructions/backend.instructions.md"
            grep -q "applyTo:" "$PROJ/.github/instructions/backend.instructions.md"
          fi
          if [ -d "$PROJ/.codex" ]; then
            test -f "$PROJ/.codex/agents/backend-developer.toml"
            grep -q 'description = "Implements backend features: APIs, services"' \
              "$PROJ/.codex/agents/backend-developer.toml"
            ! test -e "$PROJ/CODEX.md"
            test -f "$PROJ/.agents/skills/backend-add-endpoint/SKILL.md"
          fi

  remote-sources:
    name: remote-sources (git+ sources, hermetic file://)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Remote git source is cloned once per repo@ref and synced
        shell: bash
        run: |
          set -euo pipefail

          # A local "shared intelligence" git repo — no network involved.
          SHARED=$RUNNER_TEMP/shared-intel
          mkdir -p "$SHARED/shared/skills/demo-skill" "$SHARED/shared/rules"
          cat > "$SHARED/shared/skills/demo-skill/SKILL.md" <<'EOF'
          ---
          name: demo-skill
          description: "Remote demo skill pulled from git"
          ---
          # Demo skill
          Steps from the shared repo.
          EOF
          cat > "$SHARED/shared/rules/demo-rule.md" <<'EOF'
          # Shared remote rule
          REMOTE_RULE_MARKER always-on guidance from the shared repo.
          EOF
          # A hostile symlink in the remote repo, pointing at a host file.
          ln -s /etc/hosts "$SHARED/shared/rules/evil.md"
          git -C "$SHARED" init -q
          git -C "$SHARED" add -A
          git -C "$SHARED" -c user.email=ci@example.com -c user.name=ci commit -q -m shared
          URL="file://$SHARED"

          # A project that references that repo via TWO subpaths (rules + skills)
          # of the SAME repo@ref, plus a forbidden ext:: transport.
          V="$(tr -d ' \t\r\n' < intelligence/sync/scripts/VERSION)"
          PROJ=$RUNNER_TEMP/proj
          mkdir -p "$PROJ/intelligence/rules" "$PROJ/intelligence/agents" "$PROJ/intelligence/skills"
          cp -r intelligence/sync "$PROJ/intelligence/sync"
          printf '# Local context\nLocal always-on standards.\n' > "$PROJ/intelligence/rules/context.md"
          cat > "$PROJ/intelligence/config.yaml" <<EOF
          project:
            name: remote-demo
          sync_version: "$V"
          sources:
            rules:
              - "intelligence/rules"
              - "git+$URL#shared/rules"
            agents:
              - "intelligence/agents"
            skills:
              - "intelligence/skills"
              - "git+$URL#shared/skills"
              - "git+ext::FAKE#x"
              - "git+$URL#../../etc"
          targets:
            agents:
              enabled: true
              output: "AGENTS.md"
              header: |
                # Remote demo
            claude: { enabled: true, output: ".claude" }
          EOF
          git -C "$PROJ" init -q
          git -C "$PROJ" add -A
          git -C "$PROJ" -c user.email=ci@example.com -c user.name=ci commit -q -m init

          cd "$PROJ"
          out=$(bash intelligence/sync/scripts/sync.sh 2>&1)
          echo "$out"
          echo "$out" | grep -q 'IS_STATUS=ok' || { echo "missing IS_STATUS=ok"; exit 1; }

          # Same repo@ref (two subpaths) is cloned EXACTLY once.
          n=$(printf '%s\n' "$out" | grep -c 'remote: cloned') || true
          [ "$n" -eq 1 ] || { echo "expected 1 clone, got $n"; exit 1; }

          # ext:: transport is refused (never reaches git); sync still succeeds.
          echo "$out" | grep -q 'rejected (unsupported scheme)' || { echo "ext:: not rejected"; exit 1; }

          # `..` traversal in #subpath is refused before any escape.
          echo "$out" | grep -q 'subpath traversal' || { echo "traversal not rejected"; exit 1; }

          # A hostile symlink in the remote repo must not leak host files —
          # core.symlinks=false checks it out as an inert text file.
          if [ -f .claude/rules/evil.md ] && grep -qiE 'localhost|127\.0\.0\.1' .claude/rules/evil.md; then
            echo "host file leaked via remote symlink"; exit 1
          fi

          # Remote skill + remote (always-on) rule materialized into outputs.
          test -f .claude/skills/demo-skill/SKILL.md
          test -f .claude/rules/demo-rule.md
          grep -q 'demo-skill' AGENTS.md
          grep -q 'REMOTE_RULE_MARKER' AGENTS.md

          # Run-scoped clone cache is removed on exit (no leftover temp dirs).
          if find "${TMPDIR:-/tmp}" -maxdepth 1 -name 'intelligence-sync-remotes-*' 2>/dev/null | grep -q .; then
            echo "temp clone cache not cleaned up"; exit 1
          fi
          echo "OK: remote git sources cloned once, synced, ext:: refused, cache cleaned"

  migration:
    name: migration (legacy -> sync, idempotent, fail-closed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Stage a pre-0.3.1 flat project (helper)
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/stage.sh" <<'STAGE'
          stage_legacy() {
            local proj="$1"
            mkdir -p "$proj/intelligence"/{rules,agents,skills}
            # Simulate pre-0.3.1 flat layout using the current engine.
            cp -r intelligence/sync/scripts "$proj/intelligence/scripts"
            cp    intelligence/sync/INIT.md "$proj/intelligence/INIT.md"
            cp -r intelligence/sync/skills/intelligence-sync   "$proj/intelligence/skills/"
            cp -r intelligence/sync/skills/intelligence-update  "$proj/intelligence/skills/"
            # A project skill that MUST survive untouched.
            mkdir -p "$proj/intelligence/skills/backend-add-endpoint"
            printf -- '---\nname: backend-add-endpoint\ndescription: "Add endpoint"\n---\n# Add endpoint\n' \
              > "$proj/intelligence/skills/backend-add-endpoint/SKILL.md"
            printf '# Always-on context\n' > "$proj/intelligence/rules/context.md"
            cat > "$proj/intelligence/config.yaml" <<'EOF'
          project:
            name: legacy
          sources:
            rules:
              - "intelligence/rules"
            agents:
              - "intelligence/agents"
            skills:
              - "intelligence/skills"
          targets:
            agents:
              enabled: true
              output: "AGENTS.md"
              header: |
                # Legacy
          EOF
            git -C "$proj" init -q
            git -C "$proj" add -A
            git -C "$proj" -c user.email=ci@example.com -c user.name=ci commit -q -m init
          }
          STAGE
          echo "STAGE_LIB=$RUNNER_TEMP/stage.sh" >> "$GITHUB_ENV"

      - name: sync.sh on legacy fails closed with needs-update (never migrates)
        shell: bash
        run: |
          set -euo pipefail
          source "$STAGE_LIB"
          PROJ=$RUNNER_TEMP/legacy1
          stage_legacy "$PROJ"
          cd "$PROJ"
          set +e
          out=$(bash intelligence/scripts/sync.sh); rc=$?
          set -e
          echo "$out"
          [ "$rc" -eq 6 ] || { echo "expected exit 6 (needs-update), got $rc"; exit 1; }
          echo "$out" | grep -q 'IS_STATUS=needs-update' || { echo "missing needs-update"; exit 1; }
          # sync.sh must NOT migrate or generate anything.
          test -d intelligence/scripts
          test -d intelligence/skills/intelligence-sync
          ! test -d intelligence/sync
          ! test -f AGENTS.md

      - name: update.sh migrates (config-key stamp) + idempotent re-run
        shell: bash
        run: |
          set -euo pipefail
          source "$STAGE_LIB"
          PROJ=$RUNNER_TEMP/legacy2
          stage_legacy "$PROJ"
          cd "$PROJ"

          out=$(REPO_URL="file://$GITHUB_WORKSPACE" bash intelligence/scripts/update.sh --yes)
          echo "$out"
          echo "$out" | grep -q 'IS_STATUS=migrated' || { echo "expected IS_STATUS=migrated"; exit 1; }
          test -f intelligence/sync/scripts/sync.sh
          # Schema version is a config.yaml key (not a dotfile).
          ! test -e intelligence/sync/.intelligence-sync-version
          grep -Eq '^sync_version: *"[0-9]' intelligence/config.yaml
          test "$(grep -c '^sync_version:' intelligence/config.yaml)" -eq 1
          ! test -d intelligence/scripts
          [ -z "$(find intelligence/skills -maxdepth 1 -name 'intelligence-*')" ]
          test -f intelligence/skills/backend-add-endpoint/SKILL.md
          test "$(grep -c '"intelligence/sync/skills"' intelligence/config.yaml)" -eq 1

          out2=$(REPO_URL="file://$GITHUB_WORKSPACE" bash intelligence/sync/scripts/update.sh --yes)
          echo "$out2" | grep -q 'IS_STATUS=ok' || { echo "expected IS_STATUS=ok on re-run"; exit 1; }
          test "$(grep -c '^sync_version:' intelligence/config.yaml)" -eq 1
          # Now modular & current → sync.sh works and is ok.
          s=$(bash intelligence/sync/scripts/sync.sh); echo "$s" | grep -q 'IS_STATUS=ok'
          test -f AGENTS.md

      - name: Multi-version chain walks forward (0.3.1 → 0.4.0), idempotent
        shell: bash
        run: |
          set -euo pipefail
          source "$STAGE_LIB"
          # An upstream with a synthetic SECOND breaking migration appended.
          UP=$RUNNER_TEMP/up040
          mkdir -p "$UP"
          tar --exclude='.git' -cf - . | (cd "$UP" && tar -xf -)
          M="$UP/intelligence/sync/scripts/lib/migrations.sh"
          printf '0.4.0\n' > "$UP/intelligence/sync/scripts/VERSION"
          sed -i 's/^MIGRATIONS=( "0_3_1" )/MIGRATIONS=( "0_3_1" "0_4_0" )/' "$M"
          cat >> "$M" <<'EOF'

          # synthetic breaking migration for CI: structural precondition =
          # absence of the marker; idempotent; transactional.
          migrate_to_0_4_0() {
            local umbrella="$1" module_name="$2"
            local marker="$umbrella/$module_name/.mig040"
            [ -f "$marker" ] && return 0
            IS_MIGRATED=1
            : > "$marker"
            echo "  [migrate 0.4.0] applied"
          }
          EOF
          git -C "$UP" init -q
          git -C "$UP" add -A
          git -C "$UP" -c user.email=ci@example.com -c user.name=ci commit -q -m up040

          # pre-0.3.1 project walks the WHOLE chain 0.3.1 → 0.4.0 in order.
          PROJ=$RUNNER_TEMP/chain
          stage_legacy "$PROJ"
          cd "$PROJ"
          out=$(REPO_URL="file://$UP" bash intelligence/scripts/update.sh --yes)
          echo "$out"
          echo "$out" | grep -q 'IS_STATUS=migrated' || { echo "expected migrated"; exit 1; }
          test -f intelligence/sync/.mig040                       # 0.4.0 ran
          ! test -d intelligence/scripts                          # 0.3.1 ran
          grep -q '^sync_version: *"0.4.0"' intelligence/config.yaml
          # Idempotent: re-run is a clean no-op at 0.4.0.
          out2=$(REPO_URL="file://$UP" bash intelligence/sync/scripts/update.sh --yes)
          echo "$out2" | grep -q 'IS_STATUS=ok' || { echo "expected ok on re-run"; exit 1; }
          grep -q '^sync_version: *"0.4.0"' intelligence/config.yaml

      - name: Version-compat guard fails closed (ahead-of-engine)
        shell: bash
        run: |
          set -euo pipefail
          PROJ=$RUNNER_TEMP/ahead
          mkdir -p "$PROJ/intelligence"
          cp -r intelligence/sync "$PROJ/intelligence/sync"
          mkdir -p "$PROJ/intelligence/rules"
          printf '# ctx\n' > "$PROJ/intelligence/rules/context.md"
          # Schema stamped far ahead of the engine, in config.yaml.
          cat > "$PROJ/intelligence/config.yaml" <<'EOF'
          project:
            name: ahead
          sync_version: "99.0.0"
          sources:
            rules:
              - "intelligence/rules"
          targets:
            agents: { enabled: true, output: "AGENTS.md" }
          EOF
          git -C "$PROJ" init -q
          git -C "$PROJ" add -A
          git -C "$PROJ" -c user.email=ci@example.com -c user.name=ci commit -q -m init
          cd "$PROJ"
          set +e
          out=$(bash intelligence/sync/scripts/sync.sh); rc=$?
          set -e
          echo "$out"; echo "rc=$rc"
          [ "$rc" -eq 4 ] || { echo "expected exit 4 (ahead-of-engine), got $rc"; exit 1; }
          echo "$out" | grep -q 'IS_STATUS=ahead-of-engine' || { echo "missing ahead-of-engine"; exit 1; }
          ! test -f AGENTS.md

      - name: Incomplete upstream fails closed (aborted-incomplete, legacy intact)
        shell: bash
        run: |
          set -euo pipefail
          source "$STAGE_LIB"
          BROKEN=$RUNNER_TEMP/broken-upstream
          mkdir -p "$BROKEN"
          tar --exclude='.git' -cf - . | (cd "$BROKEN" && tar -xf -)
          rm -f "$BROKEN/intelligence/sync/scripts/lib/common.sh"
          git -C "$BROKEN" init -q
          git -C "$BROKEN" add -A
          git -C "$BROKEN" -c user.email=ci@example.com -c user.name=ci commit -q -m broken

          PROJ=$RUNNER_TEMP/legacy3
          stage_legacy "$PROJ"
          cd "$PROJ"
          set +e
          out=$(REPO_URL="file://$BROKEN" bash intelligence/scripts/update.sh --yes); rc=$?
          set -e
          echo "$out"
          [ "$rc" -eq 5 ] || { echo "expected exit 5 (aborted-incomplete), got $rc"; exit 1; }
          echo "$out" | grep -q 'IS_STATUS=aborted-incomplete' || { echo "missing aborted-incomplete"; exit 1; }
          # Crash-safety: legacy fully intact, nothing migrated/stamped.
          test -d intelligence/scripts
          test -e intelligence/INIT.md
          test -d intelligence/skills/intelligence-sync
          test -f intelligence/skills/backend-add-endpoint/SKILL.md
          ! grep -q '"intelligence/sync/skills"' intelligence/config.yaml
          ! grep -q '^sync_version:' intelligence/config.yaml

  guardrails:
    name: guardrails (refuse dangerous configs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Refuse output that would clobber repo root
        shell: bash
        run: |
          set -euo pipefail
          PROJ=$RUNNER_TEMP/badproj
          mkdir -p "$PROJ/intelligence"
          cp -r intelligence/sync "$PROJ/intelligence/sync"
          mkdir -p "$PROJ/intelligence/rules"
          printf '# Always-on\n' > "$PROJ/intelligence/rules/context.md"
          cat > "$PROJ/intelligence/config.yaml" <<'EOF'
          project:
            name: bad
          sync_version: "0.3.1"
          sources:
            rules:
              - "intelligence/rules"
            agents:
              - "intelligence/agents"
            skills:
              - "intelligence/skills"
          targets:
            agents:
              enabled: true
              output: "AGENTS.md"
              header: |
                # Bad
            claude: { enabled: true, output: "intelligence" }
          EOF
          git -C "$PROJ" init -q
          git -C "$PROJ" add -A
          git -C "$PROJ" -c user.email=ci@example.com -c user.name=ci commit -q -m init
          cd "$PROJ"
          if bash intelligence/sync/scripts/sync.sh; then
            echo "FAIL: sync did not refuse dangerous output path."; exit 1
          else
            echo "OK: sync refused dangerous output path."
          fi

      - name: Refuse cursor enabled without agents
        shell: bash
        run: |
          set -euo pipefail
          PROJ=$RUNNER_TEMP/noagents
          mkdir -p "$PROJ/intelligence/rules"
          cp -r intelligence/sync "$PROJ/intelligence/sync"
          printf '# Always-on\n' > "$PROJ/intelligence/rules/context.md"
          cat > "$PROJ/intelligence/config.yaml" <<'EOF'
          project:
            name: noagents
          sync_version: "0.3.1"
          sources:
            rules:
              - "intelligence/rules"
            agents:
              - "intelligence/agents"
            skills:
              - "intelligence/skills"
          targets:
            agents: { enabled: false, output: "AGENTS.md" }
            cursor: { enabled: true, output: ".cursor" }
          EOF
          git -C "$PROJ" init -q
          git -C "$PROJ" add -A
          git -C "$PROJ" -c user.email=ci@example.com -c user.name=ci commit -q -m init
          cd "$PROJ"
          if bash intelligence/sync/scripts/sync.sh; then
            echo "FAIL: sync did not enforce agents-required invariant."; exit 1
          else
            echo "OK: sync enforced agents-required invariant."
          fi

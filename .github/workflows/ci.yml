name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck
        run: |
          shellcheck --version
          # Lint the canonical module. The bridge is byte-identical (enforced
          # by the `drift` job). Skip the adapter template — `<name>`
          # placeholders are parsed as input redirection by bash/shellcheck.
          find intelligence/sync/scripts -name '*.sh' \
            -not -path '*/adapters/_template.sh' \
            -print0 | xargs -0 shellcheck --severity=warning

  drift:
    name: drift (bridge == canonical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Bridge must mirror the canonical module exactly
        shell: bash
        run: |
          set -euo pipefail
          diff -rq intelligence/scripts intelligence/sync/scripts
          diff -q  intelligence/INIT.md intelligence/sync/INIT.md
          diff -rq docs intelligence/sync/docs
          for d in intelligence/sync/skills/intelligence-*; do
            diff -rq "intelligence/skills/$(basename "$d")" "$d"
          done
          echo "OK: legacy bridge is byte-identical to intelligence/sync/"

  smoke:
    name: smoke (sync against examples)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        example: [go-api, dotnet-api-with-react-frontend, platform-with-submodules]
    steps:
      - uses: actions/checkout@v6
      - name: Stage example as project root (modular layout)
        shell: bash
        run: |
          set -euo pipefail
          PROJ=$RUNNER_TEMP/proj
          mkdir -p "$PROJ/intelligence"
          cp -r intelligence/sync "$PROJ/intelligence/sync"
          cp examples/${{ matrix.example }}/config.yaml "$PROJ/intelligence/config.yaml"

          mkdir -p "$PROJ/intelligence/rules" "$PROJ/intelligence/agents" "$PROJ/intelligence/skills"

          # Always-on rule (no `paths:`) — inlined into AGENTS.md + copied
          # into .claude/rules/ but skipped by Cursor / Copilot.
          cat > "$PROJ/intelligence/rules/context.md" <<'EOF'
          # Always-on context

          Use this for project-wide standards.
          EOF

          # Path-scoped rule — .cursor/rules/ + .github/instructions/.
          cat > "$PROJ/intelligence/rules/backend.md" <<'EOF'
          ---
          paths:
            - "src/backend/**"
          description: "Backend rules: use feature folders"
          ---

          # Backend conventions

          Some scoped guidance.
          EOF

          cat > "$PROJ/intelligence/agents/backend-developer.md" <<'EOF'
          ---
          name: backend-developer
          description: "Implements backend features: APIs, services"
          tier: heavy
          access: full
          ---

          # Backend developer

          Builds new endpoints.
          EOF

          mkdir -p "$PROJ/intelligence/skills/backend-add-endpoint"
          cat > "$PROJ/intelligence/skills/backend-add-endpoint/SKILL.md" <<'EOF'
          ---
          name: backend-add-endpoint
          description: "Add an endpoint: handler + route + tests"
          ---

          # Add endpoint

          Steps to add a new endpoint.
          EOF

          git -C "$PROJ" init -q
          git -C "$PROJ" add -A
          git -C "$PROJ" -c user.email=ci@example.com -c user.name=ci commit -q -m init
          echo "PROJ=$PROJ" >> "$GITHUB_ENV"

      - name: Run sync
        shell: bash
        run: |
          cd "$PROJ"
          bash intelligence/sync/scripts/sync.sh

      - name: Verify AGENTS.md
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PROJ/AGENTS.md"
          grep -q "Use this for project-wide standards" "$PROJ/AGENTS.md"
          grep -q "backend-developer" "$PROJ/AGENTS.md"
          grep -q "backend-add-endpoint" "$PROJ/AGENTS.md"

      - name: Verify Claude output (if enabled)
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$PROJ/.claude" ]; then
            test -f "$PROJ/.claude/rules/context.md"
            test -f "$PROJ/.claude/rules/backend.md"
            test -f "$PROJ/.claude/agents/backend-developer.md"
            test -f "$PROJ/.claude/skills/backend-add-endpoint/SKILL.md"
            grep -q "Implements backend features: APIs, services" \
              "$PROJ/.claude/agents/backend-developer.md" || true
          fi

      - name: Verify Cursor output (if enabled)
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$PROJ/.cursor" ]; then
            ! test -e "$PROJ/.cursor/rules/context.mdc"
            test -f "$PROJ/.cursor/rules/backend.mdc"
            grep -q "globs:" "$PROJ/.cursor/rules/backend.mdc"
            test -f "$PROJ/.cursor/agents/backend-developer.md"
          fi

      - name: Verify Copilot output (if enabled)
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$PROJ/.github/instructions" ] || [ -d "$PROJ/.github/agents" ]; then
            ! test -e "$PROJ/.github/copilot-instructions.md"
            test -f "$PROJ/.github/instructions/backend.instructions.md"
            grep -q "applyTo:" "$PROJ/.github/instructions/backend.instructions.md"
          fi

      - name: Verify Codex output (if enabled)
        shell: bash
        run: |
          set -euo pipefail
          if [ -d "$PROJ/.codex" ]; then
            test -f "$PROJ/.codex/agents/backend-developer.toml"
            grep -q 'description = "Implements backend features: APIs, services"' \
              "$PROJ/.codex/agents/backend-developer.toml"
            grep -q 'model_reasoning_effort = "high"' \
              "$PROJ/.codex/agents/backend-developer.toml"
            grep -q 'sandbox_mode = "workspace-write"' \
              "$PROJ/.codex/agents/backend-developer.toml"
            ! test -e "$PROJ/CODEX.md"
            ! test -e "$PROJ/.codex/config.toml"
            test -f "$PROJ/.agents/skills/backend-add-endpoint/SKILL.md"
          fi

  migration:
    name: migration (legacy -> sync, idempotent)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Stage a pre-0.3.1 flat project (helper)
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUNNER_TEMP/stage.sh" <<'STAGE'
          stage_legacy() {
            local proj="$1"
            mkdir -p "$proj/intelligence"/{rules,agents,skills}
            # Flat engine = the migration-aware bridge code.
            cp -r intelligence/scripts "$proj/intelligence/scripts"
            cp intelligence/INIT.md "$proj/intelligence/INIT.md"
            cp -r intelligence/skills/intelligence-sync   "$proj/intelligence/skills/"
            cp -r intelligence/skills/intelligence-update  "$proj/intelligence/skills/"
            # Project skill that MUST survive untouched.
            mkdir -p "$proj/intelligence/skills/backend-add-endpoint"
            printf -- '---\nname: backend-add-endpoint\ndescription: "Add endpoint"\n---\n# Add endpoint\n' \
              > "$proj/intelligence/skills/backend-add-endpoint/SKILL.md"
            printf '# Always-on context\n' > "$proj/intelligence/rules/context.md"
            cat > "$proj/intelligence/config.yaml" <<'EOF'
          project:
            name: legacy
          sources:
            rules:
              - "intelligence/rules"
            agents:
              - "intelligence/agents"
            skills:
              - "intelligence/skills"
          targets:
            agents:
              enabled: true
              output: "AGENTS.md"
              header: |
                # Legacy
          EOF
            git -C "$proj" init -q
            git -C "$proj" add -A
            git -C "$proj" -c user.email=ci@example.com -c user.name=ci commit -q -m init
          }
          STAGE
          echo "STAGE_LIB=$RUNNER_TEMP/stage.sh" >> "$GITHUB_ENV"

      - name: Offline migration via sync.sh + idempotent re-run
        shell: bash
        run: |
          set -euo pipefail
          source "$STAGE_LIB"
          PROJ=$RUNNER_TEMP/legacy1
          stage_legacy "$PROJ"
          cd "$PROJ"

          bash intelligence/scripts/sync.sh

          # Relocation
          test -f intelligence/sync/scripts/sync.sh
          test -f intelligence/sync/INIT.md
          test -d intelligence/sync/skills/intelligence-sync
          grep -qx '0.3.1' intelligence/sync/.intelligence-sync-version
          # Legacy removed — no duplicates (Linux deletes open scripts fine)
          ! test -d intelligence/scripts
          ! test -e intelligence/INIT.md
          [ -z "$(find intelligence/skills -maxdepth 1 -name 'intelligence-*')" ]
          # Project content intact
          test -f intelligence/skills/backend-add-endpoint/SKILL.md
          test -f intelligence/rules/context.md
          # Idempotent additive config line + generated output
          test "$(grep -c '"intelligence/sync/skills"' intelligence/config.yaml)" -eq 1
          test -f AGENTS.md

          # Re-run: must not fail, must not duplicate anything.
          bash intelligence/sync/scripts/sync.sh
          test -f intelligence/sync/scripts/sync.sh
          ! test -d intelligence/scripts
          [ -z "$(find intelligence/skills -maxdepth 1 -name 'intelligence-*')" ]
          test "$(grep -c '"intelligence/sync/skills"' intelligence/config.yaml)" -eq 1
          test "$(ls -d intelligence/sync/skills/intelligence-sync | wc -l)" -eq 1

      - name: update.sh migration from local upstream + idempotent re-run
        shell: bash
        run: |
          set -euo pipefail
          source "$STAGE_LIB"
          PROJ=$RUNNER_TEMP/legacy2
          stage_legacy "$PROJ"
          cd "$PROJ"

          REPO_URL="file://$GITHUB_WORKSPACE" bash intelligence/scripts/update.sh --yes

          test -f intelligence/sync/scripts/sync.sh
          test -f intelligence/sync/INIT.md
          test -d intelligence/sync/docs
          grep -qx '0.3.1' intelligence/sync/.intelligence-sync-version
          [ -z "$(find intelligence/skills -maxdepth 1 -name 'intelligence-*')" ]
          test -f intelligence/skills/backend-add-endpoint/SKILL.md
          test "$(grep -c '"intelligence/sync/skills"' intelligence/config.yaml)" -eq 1

          # Re-run update against the now-modular project: no-op, no failure.
          REPO_URL="file://$GITHUB_WORKSPACE" bash intelligence/sync/scripts/update.sh --yes
          test -f intelligence/sync/scripts/sync.sh
          test "$(grep -c '"intelligence/sync/skills"' intelligence/config.yaml)" -eq 1

          # Sync still works post-update.
          bash intelligence/sync/scripts/sync.sh
          test -f AGENTS.md

  guardrails:
    name: guardrails (refuse dangerous configs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Refuse output that would clobber repo root
        shell: bash
        run: |
          set -euo pipefail
          PROJ=$RUNNER_TEMP/badproj
          mkdir -p "$PROJ/intelligence"
          cp -r intelligence/sync "$PROJ/intelligence/sync"
          mkdir -p "$PROJ/intelligence/rules"
          cat > "$PROJ/intelligence/rules/context.md" <<'EOF'
          # Always-on
          EOF
          cat > "$PROJ/intelligence/config.yaml" <<'EOF'
          project:
            name: bad
          sources:
            rules:
              - "intelligence/rules"
            agents:
              - "intelligence/agents"
            skills:
              - "intelligence/skills"
          targets:
            agents:
              enabled: true
              output: "AGENTS.md"
              header: |
                # Bad
            claude: { enabled: true, output: "intelligence" }
          EOF
          git -C "$PROJ" init -q
          git -C "$PROJ" add -A
          git -C "$PROJ" -c user.email=ci@example.com -c user.name=ci commit -q -m init

          cd "$PROJ"
          if bash intelligence/sync/scripts/sync.sh; then
            echo "FAIL: sync did not refuse dangerous output path."
            exit 1
          else
            echo "OK: sync refused dangerous output path."
          fi

      - name: Refuse cursor enabled without agents
        shell: bash
        run: |
          set -euo pipefail
          PROJ=$RUNNER_TEMP/noagents
          mkdir -p "$PROJ/intelligence/rules"
          cp -r intelligence/sync "$PROJ/intelligence/sync"
          cat > "$PROJ/intelligence/rules/context.md" <<'EOF'
          # Always-on
          EOF
          cat > "$PROJ/intelligence/config.yaml" <<'EOF'
          project:
            name: noagents
          sources:
            rules:
              - "intelligence/rules"
            agents:
              - "intelligence/agents"
            skills:
              - "intelligence/skills"
          targets:
            agents: { enabled: false, output: "AGENTS.md" }
            cursor: { enabled: true, output: ".cursor" }
          EOF
          git -C "$PROJ" init -q
          git -C "$PROJ" add -A
          git -C "$PROJ" -c user.email=ci@example.com -c user.name=ci commit -q -m init

          cd "$PROJ"
          if bash intelligence/sync/scripts/sync.sh; then
            echo "FAIL: sync did not enforce agents-required invariant."
            exit 1
          else
            echo "OK: sync enforced agents-required invariant."
          fi

# Example: Platform with git submodules
# Submodules are separate repos — excluded from parent sync.
# They may have their own intelligence-sync setup internally.
# Paths here are EXAMPLES — use whatever your repo actually has.

project:
  name: my-platform

intelligence_sync_version: "0.3.1"

sources:
  rules:
    - "intelligence/rules"
    - "api/intelligence/rules"
    - "web/intelligence/rules"
    - "deploy/intelligence/rules"
  agents:
    - "intelligence/agents"
    - "api/intelligence/agents"
    - "web/intelligence/agents"
  skills:
    - "intelligence/skills"
    - "intelligence/sync/skills"
    - "api/intelligence/skills"
    - "web/intelligence/skills"

targets:
  agents:
    enabled: true
    output: "AGENTS.md"
    header: |
      # My Platform

      Multi-component monorepo | API + Web + Deploy | Phase: platform migration

      **Full context**: [`intelligence/rules/context.md`](intelligence/rules/context.md)
  claude: { enabled: true, output: ".claude" }
  cursor: { enabled: true, output: ".cursor" }

ignore:
  - "node_modules"
  - "vendor"
  - "dist"

submodules:
  - "libs/shared-sdk"
  - "tools/ci-runner"

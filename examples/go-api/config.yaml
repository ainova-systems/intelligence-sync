# Example: Go API service
# Single-component project. All intelligence in one location.

project:
  name: my-api

sync_version: "0.5.1"

sources:
  rules:
    - "intelligence/rules"
  agents:
    - "intelligence/agents"
  skills:
    - "intelligence/skills"
    - "intelligence/sync/skills"

targets:
  agents:
    enabled: true
    output: "AGENTS.md"
    header: |
      # My API

      Go 1.22 HTTP API | Postgres | Phase: production

      **Full context**: [`intelligence/rules/context.md`](intelligence/rules/context.md)
  claude: { enabled: true, output: ".claude" }
  cursor: { enabled: true, output: ".cursor" }

# Example: .NET API with React frontend
# Multiple components — shared intelligence at root, per-component
# next to the source code. Paths here are EXAMPLES — use whatever
# directory names your repository actually has.

project:
  name: my-platform

sync_version: "0.5.1"

sources:
  rules:
    - "intelligence/rules"
    - "backend/intelligence/rules"
    - "frontend/intelligence/rules"
  agents:
    - "intelligence/agents"
    - "backend/intelligence/agents"
    - "frontend/intelligence/agents"
  skills:
    - "intelligence/skills"
    - "intelligence/sync/skills"
    - "backend/intelligence/skills"
    - "frontend/intelligence/skills"

targets:
  agents:
    enabled: true
    output: "AGENTS.md"
    header: |
      # My Platform

      .NET 8 API + React 19 | Azure Container Apps | Phase: active development

      **Full context**: [`intelligence/rules/context.md`](intelligence/rules/context.md)
  claude: { enabled: true, output: ".claude" }
  cursor: { enabled: true, output: ".cursor" }
  copilot: { enabled: false, output: ".github" }

ignore:
  - "node_modules"
  - "dist"
  - "bin"
  - "obj"

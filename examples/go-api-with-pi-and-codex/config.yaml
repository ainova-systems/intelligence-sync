# Example: Go API service with Pi + Codex
# Demonstrates that Pi can coexist with Codex without conflicting over
# always-on rules (shared via AGENTS.md) or skills (shared via .agents/skills).

project:
  name: my-api

sync_version: "0.4.2"

sources:
  rules:
    - "intelligence/rules"
  agents:
    - "intelligence/agents"
  skills:
    - "intelligence/skills"
    - "intelligence/sync/skills"

targets:
  agents:
    enabled: true
    output: "AGENTS.md"
    header: |
      # My API

      Go 1.22 HTTP API | Postgres | Pi + Codex example

      **Full context**: [`intelligence/rules/context.md`](intelligence/rules/context.md)
  codex: { enabled: true, output: ".codex" }
  pi: { enabled: true, output: ".pi" }
